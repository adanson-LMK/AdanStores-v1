<nav class="nav">
  <div class="nav-inner">
    <a class="nav-logo" href="{% url 'shop:index' %}">AdanStore</a>
    <ul class="nav-cats">
      {% for cat in all_categories %}
      <li><a href="{% url 'shop:product_list_by_category' cat.slug %}">{{ cat.name }}</a></li>
      {% endfor %}
      <!-- Enlace especial para Ver Todo -->
      <li><a href="{% url 'shop:product_list' %}" style="opacity: 0.6;">Tienda</a></li>
    </ul>
    <div class="nav-right">
      <form action="{% url 'shop:product_list' %}" method="GET" class="nav-search-wrap">
        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="11" cy="11" r="8"/><path d="m21 21-4.35-4.35"/></svg>
        <input class="nav-search" name="q" type="text" placeholder="Buscar productos..." value="{{ request.GET.q }}"/>
      </form>
      <button class="nav-icon" id="theme-toggle" title="Cambiar modo" aria-label="Cambiar entre modo claro y oscuro">
        <svg id="theme-icon" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <path class="sun" d="M12 1v2M12 21v2M4.22 4.22l1.42 1.42M18.36 18.36l1.42 1.42M1 12h2M21 12h2M4.22 19.78l1.42-1.42M18.36 5.64l1.42-1.42M12 7a5 5 0 1 0 0 10 5 5 0 0 0 0-10z"/>
        </svg>
      </button>
      <a href="{% url 'shop:wishlist' %}" class="nav-icon" title="Lista de deseos" aria-label="Ver lista de deseos">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M20.84 4.61a5.5 5.5 0 0 0-7.78 0L12 5.67l-1.06-1.06a5.5 5.5 0 0 0-7.78 7.78l1.06 1.06L12 21.23l7.78-7.78 1.06-1.06a5.5 5.5 0 0 0 0-7.78z"/></svg>
        <span id="wishlist-count" class="cart-badge" style="background: #ff4a4a; display: {% if user.wishlist_items.count > 0 %}block{% else %}none{% endif %};"></span>
      </a>
      <a href="{% url 'shop:cart_detail' %}" class="nav-icon nav-cart" title="Carrito" aria-label="Ver carrito de compras">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="9" cy="21" r="1"/><circle cx="20" cy="21" r="1"/><path d="M1 1h4l2.68 13.39a2 2 0 0 0 2 1.61h9.72a2 2 0 0 0 2-1.61L23 6H6"/></svg>
        <span id="cart-count" class="cart-badge" aria-hidden="true"></span>
      </a>
      {% if user.is_authenticated %}
      {% if user.is_staff %}
      <a href="{% url 'shop:admin_dashboard' %}" class="nav-icon" title="Panel de Control" aria-label="Panel de Control">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="3" width="7" height="7"/><rect x="14" y="3" width="7" height="7"/><rect x="14" y="14" width="7" height="7"/><rect x="3" y="14" width="7" height="7"/></svg>
      </a>
      {% endif %}
      <a href="{% url 'shop:profile' %}" class="nav-icon" title="Mi Perfil" aria-label="Ver mi perfil">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"/><circle cx="12" cy="7" r="4"/></svg>
      </a>
      <a href="{% url 'shop:logout' %}" class="nav-icon" title="Cerrar Sesión" aria-label="Cerrar sesión de {{ user.email }}">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"/><polyline points="16 17 21 12 16 7"/><line x1="21" y1="12" x2="9" y2="12"/></svg>
      </a>
      {% else %}
      <a href="{% url 'shop:login' %}" class="nav-icon" title="Mi Cuenta" aria-label="Acceder a mi cuenta">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"/><circle cx="12" cy="7" r="4"/></svg>
      </a>
      {% endif %}
    </div>
  </div>
</nav>
